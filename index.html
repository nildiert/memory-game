<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juego de Memoria - Imágenes</title>
  <link rel="stylesheet" href="css/app.css" />
  <!-- Incluir canvas-confetti desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Pantalla para introducir el código QR -->
  <div id="qrScreen" class="screen">
    <img src="img/qr.png" alt="Código QR">
    <div class="banner">
      <h1 class="logo">
        <span class="buk">Buk</span><span class="match">Match</span>
      </h1>
      <button id="startGameBtn">Comenzar a jugar</button>
    </div>
    
  </div>  



  <!-- Pantalla del juego -->
  <div id="gameScreen" class="screen" style="display: none;">
    <div class="time-banner">
      <span class="time-label">Tiempo:</span>
      <span class="time-value" id="timer">00:00</span>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <div class="game-logo-container">
      <img src="img/logo.png" alt="Logo" class="game-logo">
    </div>
  </div>

  <!-- Pantalla de Game Over -->
  <div id="gameOverScreen" class="screen" style="display: none;">
    <div class="game-over-box">
      <h1 class="game-over-title">
        <span class="game">Game</span>
        <span class="over">Over</span>
      </h1>
    </div>
  </div>

  <!-- Pantalla de Resultados -->
  <div id="resultsScreen" class="screen" style="display: none;">
    <h1>Resultados</h1>
    <p id="resultText">10/10</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
