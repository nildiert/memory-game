<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juego de Memoria - Imágenes</title>
  <link rel="stylesheet" href="css/app.css" />
  <!-- Incluir canvas-confetti desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Pantalla para introducir el código QR -->
  <div id="qrScreen" class="screen">
    <h2>Introducir Código QR</h2>
    <input type="text" id="qrInput" placeholder="Escanea o ingresa el código QR">
    <br>
    <button id="startGameBtn">Comenzar a Jugar</button>
  </div>

  <!-- Pantalla del juego -->
  <div id="gameScreen" class="screen" style="display: none;">
    <h1>Juego de Memoria</h1>
    <div class="game-info">
      <div class="timer" id="timer">Tiempo: 00:00</div>
    </div>
    <div class="game-board" id="gameBoard"></div>
  </div>

  <!-- Pantalla de Game Over -->
  <div id="gameOverScreen" class="screen" style="display: none;">
    <h1>Game Over</h1>
  </div>

  <!-- Pantalla de Resultados -->
  <div id="resultsScreen" class="screen" style="display: none;">
    <h1>Resultados</h1>
    <p id="resultText">10/10</p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
