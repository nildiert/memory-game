<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juego de Memoria - Módulos</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <h1>Juego de Memoria</h1>

  <!-- Información del juego (cronómetro) -->
  <div class="game-info">
    <div class="timer" id="timer">Tiempo: 00:00</div>
  </div>
  
  <!-- Tablero de juego -->
  <div class="game-board" id="gameBoard"></div>

  <!-- Botón para reiniciar el juego -->
  <div class="controls">
    <button id="restartBtn">Reiniciar Juego</button>
  </div>

  <!-- Modal al finalizar el juego -->
  <div class="modal" id="endGameModal">
    <div class="modal-content">
      <span class="close-modal" id="closeModalBtn">&times;</span>
      <h2>¡Felicidades!</h2>
      <p>Has completado el juego en <span id="finalTime"></span> segundos.</p>
      <label for="playerName">Ingresa tu nombre:</label>
      <input type="text" id="playerName" placeholder="Tu nombre..." />
      <button id="saveScoreBtn">Guardar puntuación</button>
    </div>
  </div>

  <!-- Tabla de posiciones (puntuaciones) -->
  <div class="scoreboard" id="scoreboard">
    <h2>Tabla de Posiciones</h2>
    <ol id="scoreList"></ol>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
